# Create a release on every tag push.
# Tags matching *-rc* → prerelease; otherwise full release.
name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate changelog
        uses: taiki-e/install-action@git-cliff
      - name: Run git-cliff
        run: |
          TAG="${{ github.ref_name }}"
          # Full release: since last full release (ignore RCs).
          # RC release: since last full or RC release.
          if [[ "$TAG" == *-rc* ]]; then
            git-cliff --latest --strip header -o release-notes.md
          else
            git-cliff --latest --strip header --ignore-tags 'v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+' -o release-notes.md
          fi
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-rc* ]]; then
            gh release create "$TAG" --notes-file release-notes.md --prerelease
          else
            gh release create "$TAG" --notes-file release-notes.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
